# ===================================================
# Render Blueprint Configuration (100% Free Tier Setup)
# ===================================================
services:
  - type: web
    name: reali-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free # Use Render's free tier
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard to your Neon PostgreSQL link
      - key: DATABASE_SYNC_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: JWT_SECRET_KEY
        value: "reali-meal-demand-secret-key-change-in-production-2026"
