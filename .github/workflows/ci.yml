# ===================================================
# REAL.i Meal Demand AI — Continuous Integration
# ===================================================
name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ---------- Backend Test Job ----------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Backend Tests
        run: |
          python -m pytest backend/tests/

  # ---------- Frontend Build Job ----------
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Run Lint & Type Check
        run: |
          cd frontend
          npm run lint

      - name: Run Build
        run: |
          cd frontend
          npm run build

  # ---------- Docker Build & Push Job ----------
  docker-build-push:
    name: Docker Build & Push
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Private Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository }}/backend:latest
            ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: frontend
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository }}/frontend:latest
            ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
